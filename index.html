  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" role="region" aria-label="Notifications" aria-live="assertive" aria-atomic="false"></div>

  <div id="page-loader" role="progressbar" aria-label="Loading page…" aria-hidden="true">
